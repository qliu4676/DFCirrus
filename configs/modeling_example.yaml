# Optional Dragonfly defaults; values below override the preset.
preset: dragonfly

run:
  name: field
  output_dir: outputs/field
  overwrite: false
  random_seed: 12345

# Pixel scale and PSF FWHM: arcsec.
bands:
  g:
    image: data/field-g.fits
    mask: data/field-g-mask.fits
    wavelength: 4770 # Angstrom
    pixel_scale: 2.5 # arcsec/pixel
    psf_fwhm: 6.0   # arcsec
    zeropoint: 27.5
  r:
    image: data/field-r.fits
    mask: data/field-r-mask.fits
    wavelength: 6231 # Angstrom
    pixel_scale: 2.5 # arcsec/pixel
    psf_fwhm: 6.0   # arcsec
    zeropoint: 27.5
  # Add further bands using the same fields.

# Planck thermal-dust radiance HEALPix product.
planck_radiance:
  path: /Users/qliu/data/HFI_CompMap_ThermalDustModel_2048_R1.20.fits

alignment:
  reference_band: r
  psf_match: true

masks:
  combine: union
  source_threshold_sigma: 3
  dilation_radius: 10       # arcsec
  infill_small_holes: true
  maximum_infill_radius: 10 # arcsec

morphology:
  backend: rht
  working_pixel_scale: 2.5  # arcsec/pixel
  infill:
    enabled: true
    backend: maskfill       # maskfill (default) or optional cloudcovfix
    maskfill_window_size: 9 # pixels; positive odd integer
    patch_size: 51          # pixels; CloudCovFix prediction stamp width
    training_window: 129    # pixels; CloudCovFix covariance-training width
    conditioning_radius: 25 # pixels; CloudCovFix conditioning radius
    memory_budget_mb: 256   # MiB; CloudCovFix per-patch memory guard
  rht:
    radius: 2               # arcmin
    response: peak
    angle_bins: auto
    median_filter_size: 3   # pixels on the working grid
  # Used only when backend is rht_starlet.
  starlet:
    scales: 5
    keep_scales: [2, 3, 4, 5]
    threshold_sigma: 0
    include_coarse: true
  compact_rejection:
    method: segmentation
    threshold_sigma: 3
    quantile_fallback: 0.995

color:
  reference_band: r
  bands: [g, r]
  relation: linear
  regression: bisector
  combine: median
  bootstrap_samples: 100
  fit_sigma_range: [-15, 20] # relative to measured background RMS

diagnostics:
  enabled: true
  save_intermediate_fits: true
  save_plots: true
  log_level: INFO
